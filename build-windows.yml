# Builds MR_Updater.exe on GitHub's Windows servers (no Python needed on your PC).
# This file MUST live at:  .github/workflows/build-windows.yml
name: Build Windows EXE

on:
  workflow_dispatch:        # lets you start it manually from the Actions tab
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter python-docx

      - name: Build the EXE
        run: pyinstaller --onefile --windowed --noconfirm --collect-all customtkinter --name MR_Updater MR_Updater.py

      - name: Upload the EXE
        uses: actions/upload-artifact@v4
        with:
          name: MR_Updater-exe
          path: dist/MR_Updater.exe
